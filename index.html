<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>student CRUD</title>

     <link 
          rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
          integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" 
          crossorigin="anonymous">

        <link
          rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer">

    <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>

    <header class="bg-primary text-white p-4">
        <h1>student Task</h1>
    </header>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-4 mb-4 mb-md-0">
                <div class="card">
                   <div class="card-body">
                        <form id="stdForm">
                            <div class="form-group">
                               <label for="fname" class="sr-only">First Name</label>
                               <input
                                    type="text"
                                    placeholder="First Name"
                                    autocomplete="given-name"
                                    id="fname"
                                    class="form-control"
                               />
                            </div>

                            <div class="form-group">
                                <label for="lname" class="sr-only">Last Name</label>
                                <input
                                    type="text"
                                    placeholder="Last Name"
                                    autocomplete="family-name"
                                    class="form-control"
                                    id="lname"
                                />
                            </div>

                            <div class="form-group">
                                <label for="email" class="sr-only">Email</label>
                                <input
                                    type="email"
                                    placeholder="Email"
                                    autocomplete="email"
                                    class="form-control"
                                    id="email"
                                />
                            </div>

                            <div class="form-group">
                                <label for="contact" class="sr-only">Contact</label>
                                <input
                                    type="text"
                                    placeholder="Contact"
                                    autocomplete="tel"
                                    class="form-control"
                                    id="contact"
                                />
                            </div>

                            <button id="addStdBtn" type="submit" class="btn btn-primary btn-sm btn-block">
                                Add Student
                            </button>

                            <button id="updateStdBtn" type="button" class=" d-none btn btn-primary btn-sm btn-block">
                                Update Student
                            </button>

                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card">
                    <div class="card-body table-responsive">
                        <table class="table table-bordered m-0" id="stdTable">

                            <p id="noStdMsg" class="alert alert-info d-none" id="noStdMsg">
                                No Student Data !!!
                            </p>

                            <thead>
                                <tr>
                                    <th>Sr no</th>
                                    <th>Full Name</th>
                                    <th>Email</th>
                                    <th>Contact</th>
                                    <th>Edit</th>
                                    <th>Remove</th>
                                </tr>
                            </thead>

                            <tbody id="stdContainer">
                            <!--    <tr>
                                    <td>1</td>
                                    <td>Jhon Doe</td>
                                    <td>jdegmail.com</td>
                                    <td>1234567890</td>

                                    <td>
                                        <i 
                                            role="button"
                                            class="fa-solid fa-pen-to-square fa-2x text-success">
                                        </i>
                                    </td>

                                    <td>
                                        <i 
                                            role="button"
                                            class="fa-solid fa-trash fa-2x text-danger">
                                        </i>
                                    </td>
                                </tr> -->

                            </tbody>

                        </table>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="./assets/js/app.js"></script>
</body>
</html>
